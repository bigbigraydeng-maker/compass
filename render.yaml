services:
  - type: web
    name: compass-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: APP_NAME
        value: Compass MVP
      - key: APP_VERSION
        value: 1.0.0
      - key: CORS_ORIGINS
        value: '["*"]'
